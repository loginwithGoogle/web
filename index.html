<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Access Control</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .access-box {
            text-align: center;
            border: 2px solid #333;
            padding: 50px;
            background: #000;
            box-shadow: 0 0 30px rgba(255,0,0,0.2);
        }

        h1 { font-size: 2rem; letter-spacing: 2px; }
        p { color: #888; margin-bottom: 30px; }

        .access-btn {
            background: transparent;
            color: #ff3e3e;
            border: 2px solid #ff3e3e;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .access-btn:hover { 
            background: #ff3e3e; 
            color: white;
            box-shadow: 0 0 20px #ff3e3e;
        }

        
        .error-popup {
            position: absolute;
            width: 280px;
            background: #f0f0f0;
            border: 2px solid #000;
            box-shadow: 8px 8px 0px #000;
            z-index: 9999;
            color: black;
        }

        .error-header {
            background: #ff3e3e;
            color: white;
            padding: 5px 10px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            font-weight: bold;
        }

        .error-content {
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: bold;
        }

        .x-mark {
            color: white;
            background: black;
            width: 20px;
            height: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <div class="access-box" id="gate">
        <h1>ACCESS RESTRICTED</h1>
        <p>Verification required to proceed to the network.</p>
        <button class="access-btn" onclick="triggerChaos()">Click here for access</button>
    </div>

    <script>
        const alerts = [
            "CRITICAL SYSTEM FAILURE",
            "UNAUTHORIZED ACCESS DETECTED",
            "DATA CORRUPTION IN PROGRESS",
            "MALWARE INJECTION FAILED",
            "CPU OVERHEATING - 105°C",
            "KERNEL PANIC: 0x000213",
            "DELETING SYSTEM32...",
            "BUFFER OVERFLOW ERROR",
            "MEMORY LEAK DETECTED",
            "HARD DRIVE DISCONNECTED",
            "FATAL EXCEPTION OCCURRED",
            "USER BREACH DETECTED"
        ];

        function spawnError() {
            const div = document.createElement('div');
            div.className = 'error-popup';
            
            
            const x = Math.random() * (window.innerWidth - 280);
            const y = Math.random() * (window.innerHeight - 100);
            div.style.left = x + 'px';
            div.style.top = y + 'px';

            const randomMsg = alerts[Math.floor(Math.random() * alerts.length)];

            div.innerHTML = `
                <div class="error-header">
                    <span>SECURITY ALERT</span>
                    <span style="cursor:pointer" onclick="this.parentElement.parentElement.remove()">[X]</span>
                </div>
                <div class="error-content">
                    <div class="x-mark">!</div>
                    <div>${randomMsg}</div>
                </div>
            `;

            document.body.appendChild(div);
        }

        function triggerChaos() {
            
            document.getElementById('gate').style.display = 'none';
            document.body.style.background = '#000';

            
            setInterval(spawnError, 50);

            
            setTimeout(() => {
                setInterval(spawnError, 30);
                setInterval(() => {
                    document.body.style.background = (document.body.style.background === 'black' ? '#220000' : 'black');
                }, 100); 
            }, 3000);
        }
    </script>
</body>
</html>
