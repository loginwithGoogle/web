<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website0X</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0078d7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .start-container {
            text-align: center;
            color: white;
            background: rgba(0,0,0,0.2);
            padding: 40px;
            border-radius: 10px;
            backdrop-filter: blur(5px);
        }

        button {
            background: white;
            color: #0078d7;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { transform: scale(1.1); background: #f0f0f0; }

        
        .error-popup {
            position: absolute;
            width: 300px;
            background: #f0f0f0;
            border: 1px solid #000;
            box-shadow: 5px 5px 0px rgba(0,0,0,0.5);
            z-index: 9999;
            user-select: none;
        }

        .error-header {
            background: linear-gradient(to right, #000080, #1084d0);
            color: white;
            padding: 3px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            font-weight: bold;
        }

        .error-content {
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 13px;
        }

        .error-icon {
            background: red;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 20px;
        }

        .close-btn {
            background: #c0c0c0;
            border: 1px solid #fff;
            padding: 0 5px;
            cursor: pointer;
            color: black;
        }
    </style>
</head>
<body>

    <div class="start-container" id="startScreen">
        <h1>start website</h1>
        <p>click here to start</p>
        <button onclick="startChaos()">confirm</button>
    </div>

    <script>
        const errorMessages = [
            "Error 404: Brain not found",
            "Systeem oververhit!",
            "Wilt u echt alle bestanden verwijderen?",
            "Toegang geweigerd!",
            "Kritieke fout in kern-module",
            "Geheugen vol: Download meer RAM",
            "Virus detected",
            "Uw computer gaat over 5 seconden slapen",
            "Muisaanwijzer is ontsnapt",
            "Niet op deze knop drukken!"
        ];

        function createPopup() {
            const popup = document.createElement('div');
            popup.className = 'error-popup';
            
            
            const x = Math.random() * (window.innerWidth - 300);
            const y = Math.random() * (window.innerHeight - 150);
            popup.style.left = x + 'px';
            popup.style.top = y + 'px';

            const msg = errorMessages[Math.floor(Math.random() * errorMessages.length)];

            popup.innerHTML = `
                <div class="error-header">
                    <span>System Error</span>
                    <div class="close-btn" onclick="this.parentElement.parentElement.remove()">X</div>
                </div>
                <div class="error-content">
                    <div class="error-icon">X</div>
                    <div>${msg}</div>
                </div>
            `;

            document.body.appendChild(popup);
        }

        function startChaos() {
            
            document.getElementById('startScreen').style.display = 'none';
            document.body.style.background = '#000'; 

            
            setInterval(createPopup, 3000);
            
            
            setTimeout(() => {
                setInterval(createPopup, 1000);
            }, 5000);
        }
    </script>
</body>
</html>
